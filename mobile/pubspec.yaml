name: campus_compass
description: Mobile emergency guidance system for Concordia University students.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # Firebase / Push notifications
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.1.2

  # Maps
  flutter_map: ^7.0.1
  latlong2: ^0.9.1

  # Local storage / offline
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # WebSockets
  web_socket_channel: ^3.0.0

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.3.0
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/campus_map.json
